name: curan
description: "A secure Quran audio player with biometric authentication and Firebase integration."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.2.0

  # State Management
  provider: ^6.1.5

  # Biometric Authentication
  local_auth: ^3.0.1

  # Audio Player
  just_audio: ^0.9.46

  # Charts
  fl_chart: ^1.1.1

  # HTTP
  http: ^1.5.0

  # Local Storage
  shared_preferences: ^2.5.3

  # Utilities
  intl: ^0.20.2
  path_provider: ^2.1.5
  geolocator: ^13.0.2
  sensors_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
